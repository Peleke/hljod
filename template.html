<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<style>
:root {
    --bg: #0a0a0c; --surface: #141418; --surface2: #1a1a1f;
    --text: #e8e6e3; --text-dim: #8a8780; --text-faint: #5a584f;
    --accent: #ff6b35; --accent-dim: #ff6b3533;
    --cool: #4fc3f7; --cool-dim: #4fc3f722;
    --purple: #ab47bc; --purple-dim: #ab47bc33;
    --green: #66bb6a; --green-dim: #66bb6a22;
    --divider: #1e1e24; --table-row: #12121a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
    background: var(--bg); color: var(--text);
    font-family: 'Georgia', 'Times New Roman', serif;
    line-height: 1.8; font-size: 1.1rem;
    min-height: 100vh; -webkit-font-smoothing: antialiased;
}

/* --- Hydra background --- */
#hydra-canvas {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: -1; opacity: 0; transition: opacity 1.5s ease;
}
#hydra-canvas.active { opacity: 0.3; }

/* --- Navigation --- */
.top-nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: linear-gradient(to bottom, var(--bg) 80%, transparent);
    padding: 0.8rem 1rem 1.5rem;
}
.top-nav-inner {
    max-width: 900px; margin: 0 auto;
    display: flex; align-items: center; gap: 0.8rem;
    overflow-x: auto; scrollbar-width: none;
}
.top-nav-inner::-webkit-scrollbar { display: none; }
.top-nav a {
    color: var(--text-dim); text-decoration: none;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.65rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    white-space: nowrap; padding: 0.3rem 0.6rem;
    border: 1px solid transparent; border-radius: 3px; transition: all 0.2s;
}
.top-nav a:hover, .top-nav a.active {
    color: var(--accent); border-color: var(--accent-dim); background: var(--accent-dim);
}
.progress-bar {
    position: fixed; top: 0; left: 0; height: 2px;
    background: var(--accent); z-index: 200; transition: width 0.1s ease-out;
    box-shadow: 0 0 8px var(--accent), 0 0 2px var(--accent);
}

/* --- Layout --- */
.container { max-width: 800px; margin: 0 auto; padding: 5rem 2rem 6rem; }
section { padding: 3rem 0; border-bottom: 1px solid var(--divider); }
section:last-of-type { border-bottom: none; }

/* --- Typography --- */
h1 { font-size: 2.2rem; font-weight: 300; letter-spacing: 0.03em; margin-bottom: 0.3rem; }
h1 .accent { color: var(--accent); }
.subtitle {
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.7rem;
    color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 2rem;
}
h2 { font-size: 1.4rem; font-weight: 400; margin-bottom: 1rem; letter-spacing: 0.02em; }
h2 .num { font-family: 'SF Mono', monospace; font-size: 0.7rem; color: var(--accent);
    letter-spacing: 0.1em; display: block; margin-bottom: 0.3rem; }
h3 { font-size: 1.1rem; font-weight: 700; margin: 2rem 0 0.5rem; color: var(--accent); }
p { margin-bottom: 1.2rem; }
strong { color: var(--text); font-weight: 600; }
em { color: var(--accent); font-style: normal; }
code {
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.9em;
    background: var(--surface); padding: 0.15em 0.4em; border-radius: 3px; color: var(--cool);
}

/* --- Concept / callout boxes --- */
.concept {
    background: var(--surface); border-left: 3px solid var(--cool);
    padding: 1.2rem 1.5rem; margin: 1.5rem 0; border-radius: 0 6px 6px 0;
}
.concept .c-label {
    font-family: 'SF Mono', monospace; font-size: 0.6rem;
    color: var(--cool); letter-spacing: 0.12em; text-transform: uppercase;
    display: block; margin-bottom: 0.5rem;
}
.concept p { margin-bottom: 0.8rem; font-size: 1rem; }
.concept p:last-child { margin-bottom: 0; }
.concept.warm { border-left-color: var(--accent); }
.concept.warm .c-label { color: var(--accent); }

/* --- Try-this prompts --- */
.try-this {
    background: var(--surface2); border: 1px solid var(--divider);
    padding: 1rem 1.5rem; margin: 1.5rem 0; border-radius: 6px;
}
.try-this .label {
    font-family: 'SF Mono', monospace; font-size: 0.6rem;
    color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
    display: block; margin-bottom: 0.3rem;
}
.try-this p { font-size: 0.95rem; margin-bottom: 0.5rem; }
.try-this p:last-child { margin-bottom: 0; }

/* --- Exercises --- */
.exercises {
    background: var(--green-dim); border: 1px solid #66bb6a33;
    border-radius: 8px; padding: 1.5rem; margin: 2rem 0;
}
.exercises .ex-label {
    font-family: 'SF Mono', monospace; font-size: 0.65rem;
    color: var(--green); letter-spacing: 0.1em; text-transform: uppercase;
    display: block; margin-bottom: 0.8rem;
}
.exercises ol { padding-left: 1.4rem; }
.exercises li { margin-bottom: 0.8rem; font-size: 0.95rem; line-height: 1.6; }

/* --- Strudel editor containers --- */
.strudel-block {
    margin: 1.5rem 0;
    border: 1px solid var(--divider);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
}
.strudel-block strudel-editor {
    display: block;
    width: 100%;
}
/* Reduce internal padding/space in the strudel component */
.strudel-block strudel-editor::part(editor) { padding: 0; }
.strudel-block .cm-editor { min-height: auto !important; }
.strudel-block .cm-scroller { min-height: auto !important; }
.strudel-label {
    font-family: 'SF Mono', monospace; font-size: 0.6rem;
    color: var(--text-faint); letter-spacing: 0.1em; text-transform: uppercase;
    padding: 0.5rem 1rem;
    background: var(--surface);
    border-bottom: 1px solid var(--divider);
    display: flex; justify-content: space-between; align-items: center;
}
.strudel-controls { display: flex; gap: 0.4rem; }
.strudel-play, .strudel-stop, .strudel-share {
    font-family: 'SF Mono', monospace; font-size: 0.65rem;
    padding: 0.2rem 0.6rem; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--divider); background: var(--surface); color: var(--text-dim);
    transition: all 0.2s; letter-spacing: 0.04em;
}
.strudel-play:hover { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.strudel-stop:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.strudel-share:hover { border-color: var(--cool); color: var(--cool); background: var(--cool-dim); }
.strudel-play.playing { border-color: var(--green); color: var(--bg); background: var(--green); }
.strudel-share.copied { border-color: var(--green); color: var(--bg); background: var(--green); }

/* --- Earned / collapsible index --- */
details.earned {
    background: var(--surface); border: 1px solid var(--divider);
    border-radius: 6px; padding: 0; margin: 2rem 0; overflow: hidden;
}
details.earned summary {
    font-family: 'SF Mono', monospace; font-size: 0.7rem;
    color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase;
    padding: 1rem 1.5rem; cursor: pointer; list-style: none;
    display: flex; align-items: center; gap: 0.5rem;
}
details.earned summary::-webkit-details-marker { display: none; }
details.earned summary::before { content: '\25B6'; font-size: 0.5rem; transition: transform 0.2s; }
details.earned[open] summary::before { transform: rotate(90deg); }
details.earned[open] summary { border-bottom: 1px solid var(--divider); }
details.earned .earned-body { padding: 1rem 1.5rem; }
details.earned table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 0; }
details.earned th {
    font-family: 'SF Mono', monospace; font-size: 0.6rem; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: uppercase; text-align: left;
    padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--divider);
}
details.earned td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #111115; }
details.earned tr:nth-child(even) td { background: var(--table-row); }
details.earned td:first-child { font-family: 'SF Mono', monospace; color: var(--cool); font-weight: 600; }
details.earned .earned-next {
    margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--divider);
    font-size: 0.95rem;
}

/* --- Rabbit hole collapsibles --- */
details.rabbit-hole {
    background: var(--surface); border: 1px solid var(--divider);
    border-radius: 6px; margin: 1.5rem 0; overflow: hidden;
}
details.rabbit-hole summary {
    font-family: 'SF Mono', monospace; font-size: 0.7rem;
    color: var(--purple); letter-spacing: 0.1em; text-transform: uppercase;
    padding: 1rem 1.5rem; cursor: pointer; list-style: none;
    display: flex; align-items: center; gap: 0.5rem;
}
details.rabbit-hole summary::-webkit-details-marker { display: none; }
details.rabbit-hole summary::before { content: '\25B6'; font-size: 0.5rem; transition: transform 0.2s; }
details.rabbit-hole[open] summary::before { transform: rotate(90deg); }
details.rabbit-hole[open] summary { border-bottom: 1px solid var(--divider); }
details.rabbit-hole .rh-body { padding: 1.5rem; }
details.rabbit-hole .rh-body h4 { font-size: 1rem; font-weight: 600; color: var(--purple); margin: 1.5rem 0 0.5rem; }
details.rabbit-hole .rh-body h4:first-child { margin-top: 0; }
details.rabbit-hole .rh-body p { font-size: 0.95rem; margin-bottom: 1rem; }
details.rabbit-hole table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 0 0 1rem; }
details.rabbit-hole th {
    font-family: 'SF Mono', monospace; font-size: 0.6rem; color: var(--text-dim);
    letter-spacing: 0.08em; text-transform: uppercase; text-align: left;
    padding: 0.4rem 0.6rem; border-bottom: 1px solid var(--divider);
}
details.rabbit-hole td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #111115; }
details.rabbit-hole tr:nth-child(even) td { background: var(--table-row); }
details.rabbit-hole td:first-child { font-family: 'SF Mono', monospace; color: var(--cool); font-weight: 600; }

/* --- Punchline / capstone highlight --- */
.punchline {
    background: linear-gradient(135deg, var(--accent-dim), var(--cool-dim));
    border: 1px solid var(--divider); border-radius: 8px; padding: 2rem; margin: 2rem 0;
}
.punchline p { margin-bottom: 0.8rem; }
.punchline p:last-child { margin-bottom: 0; }

/* --- Floating controls --- */
.float-controls {
    position: fixed; bottom: 1rem; right: 1rem; z-index: 50;
    display: flex; gap: 0.5rem; align-items: center;
    background: rgba(20, 20, 24, 0.92); padding: 0.5rem 0.8rem;
    border-radius: 6px; border: 1px solid var(--divider); backdrop-filter: blur(8px);
}
.ctrl-btn {
    font-family: 'SF Mono', monospace; font-size: 0.65rem;
    padding: 0.3rem 0.7rem; border-radius: 3px; cursor: pointer;
    border: 1px solid var(--divider); background: var(--surface); color: var(--text-dim);
    transition: all 0.2s; letter-spacing: 0.04em;
}
.ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
.ctrl-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* --- Responsive --- */
@media (max-width: 640px) {
    .container { padding: 4.5rem 1.2rem 4rem; }
    body { font-size: 1rem; }
    h1 { font-size: 1.6rem; }
    .float-controls { bottom: 0.5rem; right: 0.5rem; }
}
</style>
</head><body>

<!-- Hydra background canvas -->
<canvas id="hydra-canvas"></canvas>

<div class="progress-bar" id="progress"></div>
<nav class="top-nav"><div class="top-nav-inner">
    <a href="index.html" class="back">&larr;</a>
{{NAV_LINKS}}
</div></nav>

<!-- Floating controls -->
<div class="float-controls">
    <button class="ctrl-btn" id="hydra-btn" onclick="toggleHydra()">&#x25C8; hydra</button>
    <button class="ctrl-btn" id="hush-btn" onclick="hushAll()">&#x23F9; hush</button>
</div>

<div class="container">

{{HERO}}

{{SECTIONS}}

</div><!-- /container -->
<!-- ============ SCRIPTS ============ -->

<!-- Hydra (loaded first, before strudel, to set up audio tap) -->
<script src="https://unpkg.com/hydra-synth@1.3.29/dist/hydra-synth.js"></script>

<!-- Audio routing: intercept AudioContext so we can tap strudel's audio for hydra -->
<script>
(function() {
    const _AC = window.AudioContext || window.webkitAudioContext;
    let capturedCtx = null;
    let audioAnalyser = null;
    const dataArray = new Uint8Array(128);

    window._audioData = {
        fft: [0, 0, 0, 0],
        vol: 0,
        tick() {
            if (!audioAnalyser) return;
            audioAnalyser.getByteFrequencyData(dataArray);
            const binSize = Math.floor(dataArray.length / 4);
            for (let i = 0; i < 4; i++) {
                let sum = 0;
                for (let j = i * binSize; j < (i + 1) * binSize; j++) sum += dataArray[j];
                this.fft[i] = sum / (binSize * 255);
            }
            this.vol = this.fft.reduce((a, b) => a + b, 0) / 4;
        },
        setBins() {}, setSmooth() {}, setCutoff() {}, setScale() {},
        show() {}, hide() {}
    };

    const _connect = AudioNode.prototype.connect;
    AudioNode.prototype.connect = function(dest, ...args) {
        const result = _connect.call(this, dest, ...args);
        try {
            if (capturedCtx && dest === capturedCtx.destination && audioAnalyser) {
                _connect.call(this, audioAnalyser);
            }
        } catch(e) {}
        return result;
    };

    class InstrumentedAC extends _AC {
        constructor(...args) {
            super(...args);
            if (!capturedCtx) {
                capturedCtx = this;
                audioAnalyser = this.createAnalyser();
                audioAnalyser.fftSize = 256;
            }
        }
    }
    window.AudioContext = InstrumentedAC;
    if (window.webkitAudioContext) window.webkitAudioContext = InstrumentedAC;
})();
</script>

<!-- Strudel REPL web component -->
<script src="https://unpkg.com/@strudel/repl@1.3.0"></script>

<!-- Page logic -->
<script>
// --- Hydra setup ---
let hydra = null;
let hydraActive = false;

function initHydra() {
    const canvas = document.getElementById('hydra-canvas');
    try {
        hydra = new Hydra({
            canvas: canvas,
            detectAudio: false,
            makeGlobal: false,
            autoLoop: true,
            width: window.innerWidth,
            height: window.innerHeight,
            precision: 'mediump'
        });
        const h = hydra.synth;
        h.a = window._audioData;
        h.update = () => { window._audioData.tick(); };

        h.osc(20, 0.08, 1.5)
            .color(1.0, 0.4, 0.1)
            .rotate(() => window._audioData.fft[0] * Math.PI * 0.5)
            .modulateScale(
                h.osc(3, 0.2).rotate(0.3),
                () => 0.1 + window._audioData.fft[1] * 0.5
            )
            .scale(() => 1.0 + window._audioData.vol * 0.3)
            .saturate(() => 1.2 + window._audioData.fft[2] * 2)
            .kaleid(() => 2 + Math.floor(window._audioData.fft[3] * 4))
            .out();
    } catch(e) {
        console.warn('[hydra] init failed:', e);
    }
}

function toggleHydra() {
    const canvas = document.getElementById('hydra-canvas');
    const btn = document.getElementById('hydra-btn');
    if (!hydra) initHydra();
    hydraActive = !hydraActive;
    canvas.classList.toggle('active', hydraActive);
    btn.classList.toggle('active', hydraActive);
}

// --- Editor helpers ---
function getEditorFromBtn(btn) {
    const block = btn.closest('.strudel-block');
    return block ? block.querySelector('strudel-editor') : null;
}

function getEditorCode(el) {
    if (!el || !el.editor) return '';
    // Try known StrudelMirror / CodeMirror accessors
    if (typeof el.editor.getCode === 'function') return el.editor.getCode();
    if (el.editor.code) return el.editor.code;
    if (el.editor.view && el.editor.view.state) return el.editor.view.state.doc.toString();
    // Fallback: read from attribute or inner HTML comment
    if (el.getAttribute('code')) return el.getAttribute('code');
    const html = el.innerHTML;
    const m = html.match(/<!--([\s\S]*?)-->/);
    return m ? m[1].trim() : '';
}

function strudelPlay(btn) {
    const el = getEditorFromBtn(btn);
    if (!el) return;
    // Stop all others
    document.querySelectorAll('.strudel-play.playing').forEach(b => b.classList.remove('playing'));
    document.querySelectorAll('strudel-editor').forEach(other => {
        if (other !== el && other.editor && other.editor.stop) {
            try { other.editor.stop(); } catch(e) {}
        }
    });
    if (el.editor) {
        try {
            el.editor.evaluate();
            el.editor.start();
            btn.classList.add('playing');
        } catch(e) {
            try { el.editor.evaluate(); btn.classList.add('playing'); } catch(e2) {}
        }
    }
}

function strudelStop(btn) {
    const el = getEditorFromBtn(btn);
    if (!el) return;
    if (el.editor && el.editor.stop) {
        try { el.editor.stop(); } catch(e) {}
    }
    const playBtn = btn.closest('.strudel-controls').querySelector('.strudel-play');
    if (playBtn) playBtn.classList.remove('playing');
}

function strudelShare(btn) {
    const el = getEditorFromBtn(btn);
    const code = getEditorCode(el);
    if (!code) return;
    const url = 'https://strudel.cc/#' + encodeURIComponent(btoa(unescape(encodeURIComponent(code))));
    navigator.clipboard.writeText(url).then(() => {
        btn.classList.add('copied');
        const orig = btn.innerHTML;
        btn.innerHTML = '&#10003; copied';
        setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 2000);
    }).catch(() => {
        // Fallback: open in new tab
        window.open(url, '_blank');
    });
}

function hushAll() {
    document.querySelectorAll('strudel-editor').forEach(el => {
        if (el.editor && el.editor.stop) {
            try { el.editor.stop(); } catch(e) {}
        }
    });
    document.querySelectorAll('.strudel-play.playing').forEach(b => b.classList.remove('playing'));
}

// --- Ctrl+Enter / Cmd+Enter ---
document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        const active = document.activeElement;
        const block = active ? active.closest('.strudel-block') : null;
        if (block) {
            e.preventDefault();
            e.stopPropagation();
            const playBtn = block.querySelector('.strudel-play');
            if (playBtn) strudelPlay(playBtn);
        }
    }
}, true);

// --- Scroll progress ---
window.addEventListener('scroll', () => {
    const h = document.documentElement.scrollHeight - window.innerHeight;
    const pct = h > 0 ? (window.scrollY / h) * 100 : 0;
    document.getElementById('progress').style.width = pct + '%';
});

// --- Nav highlight ---
const sections = document.querySelectorAll('section[id]');
const navLinks = document.querySelectorAll('.top-nav a[href^="#"]');
const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            navLinks.forEach(a => a.classList.remove('active'));
            const link = document.querySelector(`.top-nav a[href="#${entry.target.id}"]`);
            if (link) link.classList.add('active');
        }
    });
}, { rootMargin: '-40% 0px -55% 0px' });
sections.forEach(s => observer.observe(s));

// --- Resize hydra ---
window.addEventListener('resize', () => {
    if (hydra) hydra.setResolution(window.innerWidth, window.innerHeight);
});
</script>

</body></html>
